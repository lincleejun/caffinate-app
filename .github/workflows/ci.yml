name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Run tests
        # 用 release 产物 + 自己 ad-hoc 重签后直接执行，而不是 `swift run`：
        # 引入 Sparkle 后 runner 的 amfid 会杀掉 SwiftPM 生成的带调试 entitlement
        # 的 ad-hoc 二进制（Killed: 9 / exit 137）。重签保证签名有效。
        run: |
          swift build -c release --product caffinate-tests
          codesign --force --sign - .build/release/caffinate-tests
          .build/release/caffinate-tests

  release:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: macos-15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          # build-app.sh 用 git rev-list/describe 派生版本号，需全量历史与 tag
          fetch-depth: 0
      - name: Build app bundle (ad-hoc signed)
        run: ./scripts/build-app.sh
      - name: Package artifacts
        run: |
          ditto -c -k --keepParent dist/Caffinate.app Caffinate.app.zip
          cp dist/caf caf
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # v0.* 自动标记为 pre-release
          PRERELEASE=""
          case "${GITHUB_REF_NAME}" in
            v0.*) PRERELEASE="--prerelease" ;;
          esac
          gh release create "${GITHUB_REF_NAME}" \
            Caffinate.app.zip caf \
            $PRERELEASE \
            --title "${GITHUB_REF_NAME}" \
            --notes "未签名构建。首次打开:右键 App → 打开(或 \`xattr -dr com.apple.quarantine Caffinate.app\`)。CLI: \`sudo cp caf /usr/local/bin/\`。"
