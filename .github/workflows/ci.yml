name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Run tests
        run: swift run caffinate-tests

  release:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: macos-15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Build app bundle (ad-hoc signed)
        run: ./scripts/build-app.sh
      - name: Package artifacts
        run: |
          ditto -c -k --keepParent dist/Caffinate.app Caffinate.app.zip
          cp dist/caf caf
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            Caffinate.app.zip caf \
            --title "${GITHUB_REF_NAME}" \
            --notes "未签名构建。首次打开:右键 App → 打开(或 \`xattr -dr com.apple.quarantine Caffinate.app\`)。CLI: \`sudo cp caf /usr/local/bin/\`。"
