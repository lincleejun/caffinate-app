name: Rolling Release

# 推送到 release 分支 → 自动打包（无证书 ad-hoc）+ Sparkle EdDSA 签名 +
# 更新固定的 `release-latest` 预发布。App 内的 Sparkle 通过该 release 的
# appcast.xml 自动检查更新。
on:
  push:
    branches: [release]

permissions:
  contents: write

# 同一时刻只跑一个，避免并发改写 release-latest
concurrency:
  group: rolling-release
  cancel-in-progress: true

env:
  ROLLING_TAG: release-latest
  DOWNLOAD_PREFIX: https://github.com/${{ github.repository }}/releases/download/release-latest/

jobs:
  rolling:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          # build-app.sh 用 `git rev-list --count` 与 `git describe` 派生版本，需全量历史与 tag
          fetch-depth: 0

      - name: Run tests
        run: swift run caffinate-tests

      - name: Build app bundle (ad-hoc, 无证书 + 内嵌 Sparkle)
        run: ./scripts/build-app.sh

      - name: Stage update archive
        run: |
          mkdir -p staging
          ditto -c -k --keepParent dist/Caffinate.app staging/Caffinate.app.zip
          cp dist/caf staging/caf

      - name: Generate & sign appcast
        env:
          SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
        run: |
          if [ -z "${SPARKLE_ED_PRIVATE_KEY}" ]; then
            echo "::error::缺少 GitHub Secret SPARKLE_ED_PRIVATE_KEY —— 自动更新无法签名。" \
                 "请在仓库 Settings → Secrets and variables → Actions 添加后重试。"
            exit 1
          fi
          ./scripts/make-appcast.sh staging "${DOWNLOAD_PREFIX}"

      - name: Publish rolling pre-release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' dist/Caffinate.app/Contents/Info.plist)"
          # 固定 tag 滚动更新：先删旧 release+tag，再以当前提交重建
          gh release delete "${ROLLING_TAG}" --yes --cleanup-tag 2>/dev/null || true
          gh release create "${ROLLING_TAG}" \
            staging/Caffinate.app.zip staging/appcast.xml staging/caf \
            --prerelease \
            --target "${GITHUB_SHA}" \
            --title "Rolling (${VERSION})" \
            --notes "自动滚动构建（未签名，首次打开右键→打开或 \`xattr -dr com.apple.quarantine Caffinate.app\`）。已安装版本会经 Sparkle 自动更新到此。CLI: \`sudo cp caf /usr/local/bin/\`。"
